version: '3.8'

services:
  backend:
    build: ./backend
    container_name: blog-backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: blog-frontend
    ports:
      - "5174:5174"
    depends_on:
      - backend
    restart: unless-stopped
